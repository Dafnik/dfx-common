name: release dfx-bootstrap-table

on:
  push:
    tags:
      - 'dfx-bootstrap-table**'

permissions:
  id-token: write # Required for OIDC
  contents: write # Required for GitHub release action

jobs:
  dfx-bootstrap-table:
    uses: ./.github/workflows/release.yml
    with:
      lib: dfx-bootstrap-table
